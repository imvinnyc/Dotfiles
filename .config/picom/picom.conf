#################################
#             Shadows           #
#################################

# Enabled client-side shadows on windows. Note desktop windows
# (windows with '_NET_WM_WINDOW_TYPE_DESKTOP') never get shadow,
# unless explicitly requested using the wintypes option.
#
# Can be set per-window using rules.
#
# Default: false
shadow = true;

# The blur radius for shadows, in pixels.
#
# Default: 12
shadow-radius = 12;

# The opacity of shadows.
#
# Range: 0.0 - 1.0
# Default: 0.75
shadow-opacity = 0.75;

# The left offset for shadows, in pixels.
#
# Default: -15
shadow-offset-x = -7;

# The top offset for shadows, in pixels.
#
# Default: -15
shadow-offset-y = -7;

# Hex string color value of shadow. Formatted like "#RRGGBB", e.g. "#C0FFEE".
#
# Default: #000000
shadow-color = "#000000";

# Crop shadow of a window fully on a particular monitor to that monitor. This is
# currently implemented using the X RandR extension.
#
# Default: false
crop-shadow-to-monitor = false;


#################################
#           Fading              #
#################################

# Fade windows in/out when opening/closing and when opacity changes,
# unless no-fading-openclose is used. Can be set per-window using rules.
#
# Default: false
fading = true;

# Opacity change between steps while fading in. (0.01 - 1.0, defaults to 0.028)
fade-in-step = 0.03;

# Opacity change between steps while fading out. (0.01 - 1.0, defaults to 0.03)
fade-out-step = 0.03;

# The time between steps in fade step, in milliseconds. (> 0, defaults to 10)
# fade-delta = 10;

# Do not fade on window open/close.
# Default: false
no-fading-openclose = false;


#################################
#   Transparency / Opacity      #
#################################

# Opacity of window titlebars and borders.
#
# Range: 0.1 - 1.0
# Default: 1.0 (disabled)
frame-opacity = 0.9;

# Use fixed inactive dim value, instead of adjusting according to window opacity.
#
# Default: false
inactive-dim-fixed = true;


#################################
#           Corners             #
#################################

# Sets the radius of rounded window corners. When > 0, the compositor will
# round the corners of windows. Does not interact well with
# `transparent-clipping`.
#
# Default: 0 (disabled)
corner-radius = 10;


#################################
#            Blur               #
#################################

# Parameters for background blurring, see BLUR section in the man page for more information.
#
# Default: ""
#blur-method = "kawase";

# The strength of the blur effect.
#
# Default: 0 (disabled)
blur-strength = 5;


#################################
#            Animations         #
#################################

# Enable animations for windows.
#
# Default: false
animations = true;

# Smoothness of the animation. Lower is smoother.
#
# Default: 0
animation-stiffness = 120;

# Animation effect for opening windows.
animation-for-open-window = "fade slide 0 10";

# Animation effect for closing windows.
animation-for-close-window = "zoom-out";

# Mass of the window. Affects motion-based animations.
animation-window-mass = 0.8;


#################################
#       General Settings        #
#################################

# Enable/disable VSync.
#
# Default: false
vsync = true;

# Specify the backend to use: `xrender`, `glx`, or `egl`.
#
# Default: "xrender"
backend = "glx";

# Try to detect windows with rounded corners and don't consider them
# shaped windows. The accuracy is not very high, unfortunately.
#
# Default: false
detect-rounded-corners = true;

# Use of damage information for rendering. This causes only the parts of the
# screen that have actually changed to be redrawn, instead of the whole screen
# every time. Should improve performance.
#
# Default: false
use-damage = true;


#################################
#           Rules               #
#################################

rules: ({
  # Tooltip windows
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  # Dock, desktop, and GTK frame extents
  match = "window_type = 'dock'    || "
          "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  blur-background = false;
}, {
  # General windows excluding docks
  match = "window_type != 'dock'";
  corner-radius = 10;
}, {
  # Notifications, Conky, and Cairo-clock
  match = "name = 'Notification'   || "
          "class_g = 'Conky'       || "
          "class_g ?= 'Notify-osd' || "
          "class_g = 'Cairo-clock' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
}, {
  # Kitty terminal
  match = "class_g = 'Kitty'";
  opacity = 0.9;
}, {
  # Rofi launcher
  match = "class_g = 'Rofi'";
  opacity = 0.85;
}, {
  # Firefox browser
  match = "class_g = 'Firefox'";
  opacity = 0.95;
}, {
  # Alacritty terminal
  match = "class_g = 'Alacritty'";
  opacity = 0.8;
}, {
  # Tooltips
  match = "window_type = 'tooltip'";
  opacity = 0.8;
});

